const CAPTIONS = ["Pick the last element as the pivot (3, coral). Everything else will be compared to it.","2 is smaller than pivot 3, so it swapped with 5 into the left zone. Now scanning 8.","1 also swapped into the left zone. Scan done: 2 and 1 sit left of where the pivot will land.","Pivot 3 trades places with the 8 at index 2 \u2014 its final spot. Right [5, 9, 8] is split off but unsorted; recurse."];
let i = 0, timer = null;
const stage = document.getElementById('stage');
const caption = document.getElementById('caption');
const count = document.getElementById('count');
function show(n){
  i = (n + FRAMES.length) % FRAMES.length;
  stage.innerHTML = FRAMES[i];
  caption.textContent = CAPTIONS[i] || '';
  count.textContent = (i+1) + ' / ' + FRAMES.length;
}
document.getElementById('prev').onclick = () => show(i-1);
document.getElementById('next').onclick = () => show(i+1);
document.getElementById('play').onclick = (e) => {
  if (timer){ clearInterval(timer); timer = null; e.target.textContent = 'Auto-play'; }
  else { timer = setInterval(() => show(i+1), 1200); e.target.textContent = 'Pause'; }
};
