<svg class="cd-svg" xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 248" role="img" font-family="sans-serif">
  <title>Binary search eliminates half the array in one comparison</title>
  <desc>A sorted array of eleven cells with lo, mid and hi pointers. The midpoint value 34 is less than the target 41, so the left half is greyed out as eliminated and the right half stays highlighted.</desc>
  <defs>
    <style>text{font-family:-apple-system,"Segoe UI",Roboto,system-ui,"Helvetica Neue",Arial,sans-serif;}
text.t{font-size:14px;font-weight:400;fill:#1c1c1a;}
text.ts{font-size:12px;font-weight:400;fill:#6b6a64;}
text.th{font-size:14px;font-weight:500;fill:#111110;}
rect.box,.box>rect{fill:#F1EFE8;stroke:#D3D1C7;}
.arr{stroke:#6b6a64;stroke-width:1.5;fill:none;stroke-linecap:round;}
.leader{stroke:#9c9a92;stroke-width:0.5;stroke-dasharray:3 3;fill:none;}
.c-purple>rect,.c-purple>circle,.c-purple>ellipse,.c-purple>polygon{fill:#EEEDFE;stroke:#534AB7;}
.c-purple .th,.c-purple .t{fill:#3C3489;} .c-purple .ts{fill:#534AB7;}
.c-teal>rect,.c-teal>circle,.c-teal>ellipse,.c-teal>polygon{fill:#E1F5EE;stroke:#0F6E56;}
.c-teal .th,.c-teal .t{fill:#085041;} .c-teal .ts{fill:#0F6E56;}
.c-coral>rect,.c-coral>circle,.c-coral>ellipse,.c-coral>polygon{fill:#FAECE7;stroke:#993C1D;}
.c-coral .th,.c-coral .t{fill:#712B13;} .c-coral .ts{fill:#993C1D;}
.c-pink>rect,.c-pink>circle,.c-pink>ellipse,.c-pink>polygon{fill:#FBEAF0;stroke:#993556;}
.c-pink .th,.c-pink .t{fill:#72243E;} .c-pink .ts{fill:#993556;}
.c-gray>rect,.c-gray>circle,.c-gray>ellipse,.c-gray>polygon{fill:#F1EFE8;stroke:#5F5E5A;}
.c-gray .th,.c-gray .t{fill:#444441;} .c-gray .ts{fill:#5F5E5A;}
.c-blue>rect,.c-blue>circle,.c-blue>ellipse,.c-blue>polygon{fill:#E6F1FB;stroke:#185FA5;}
.c-blue .th,.c-blue .t{fill:#0C447C;} .c-blue .ts{fill:#185FA5;}
.c-green>rect,.c-green>circle,.c-green>ellipse,.c-green>polygon{fill:#EAF3DE;stroke:#3B6D11;}
.c-green .th,.c-green .t{fill:#27500A;} .c-green .ts{fill:#3B6D11;}
.c-amber>rect,.c-amber>circle,.c-amber>ellipse,.c-amber>polygon{fill:#FAEEDA;stroke:#854F0B;}
.c-amber .th,.c-amber .t{fill:#633806;} .c-amber .ts{fill:#854F0B;}
.c-red>rect,.c-red>circle,.c-red>ellipse,.c-red>polygon{fill:#FCEBEB;stroke:#A32D2D;}
.c-red .th,.c-red .t{fill:#791F1F;} .c-red .ts{fill:#A32D2D;}
@media (prefers-color-scheme:dark){
text.t{fill:#d6d4ca;} text.ts{fill:#b6b4aa;} text.th{fill:#f2f0e9;}
rect.box,.box>rect{fill:#2C2C2A;stroke:#5F5E5A;}
.arr{stroke:#b0aea4;} .leader{stroke:#8a8980;}
.c-purple>rect,.c-purple>circle,.c-purple>ellipse,.c-purple>polygon{fill:#3C3489;stroke:#AFA9EC;}
.c-purple .th,.c-purple .t{fill:#CECBF6;} .c-purple .ts{fill:#AFA9EC;}
.c-teal>rect,.c-teal>circle,.c-teal>ellipse,.c-teal>polygon{fill:#085041;stroke:#5DCAA5;}
.c-teal .th,.c-teal .t{fill:#9FE1CB;} .c-teal .ts{fill:#5DCAA5;}
.c-coral>rect,.c-coral>circle,.c-coral>ellipse,.c-coral>polygon{fill:#712B13;stroke:#F0997B;}
.c-coral .th,.c-coral .t{fill:#F5C4B3;} .c-coral .ts{fill:#F0997B;}
.c-pink>rect,.c-pink>circle,.c-pink>ellipse,.c-pink>polygon{fill:#72243E;stroke:#ED93B1;}
.c-pink .th,.c-pink .t{fill:#F4C0D1;} .c-pink .ts{fill:#ED93B1;}
.c-gray>rect,.c-gray>circle,.c-gray>ellipse,.c-gray>polygon{fill:#444441;stroke:#B4B2A9;}
.c-gray .th,.c-gray .t{fill:#D3D1C7;} .c-gray .ts{fill:#B4B2A9;}
.c-blue>rect,.c-blue>circle,.c-blue>ellipse,.c-blue>polygon{fill:#0C447C;stroke:#85B7EB;}
.c-blue .th,.c-blue .t{fill:#B5D4F4;} .c-blue .ts{fill:#85B7EB;}
.c-green>rect,.c-green>circle,.c-green>ellipse,.c-green>polygon{fill:#27500A;stroke:#97C459;}
.c-green .th,.c-green .t{fill:#C0DD97;} .c-green .ts{fill:#97C459;}
.c-amber>rect,.c-amber>circle,.c-amber>ellipse,.c-amber>polygon{fill:#633806;stroke:#EF9F27;}
.c-amber .th,.c-amber .t{fill:#FAC775;} .c-amber .ts{fill:#EF9F27;}
.c-red>rect,.c-red>circle,.c-red>ellipse,.c-red>polygon{fill:#791F1F;stroke:#F09595;}
.c-red .th,.c-red .t{fill:#F7C1C1;} .c-red .ts{fill:#F09595;}
}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

    <text class="th" x="40" y="40">Binary search, one step</text>
  <text class="ts" x="40" y="60">Check the midpoint, then throw away the half that can't contain the target</text>
  <text class="ts" x="100" y="96" text-anchor="middle">0</text>
  <g class="c-gray"><rect x="76" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="100" y="129" text-anchor="middle" dominant-baseline="central">3</text></g>
  <text class="ts" x="148" y="96" text-anchor="middle">1</text>
  <g class="c-gray"><rect x="124" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="148" y="129" text-anchor="middle" dominant-baseline="central">8</text></g>
  <text class="ts" x="196" y="96" text-anchor="middle">2</text>
  <g class="c-gray"><rect x="172" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="196" y="129" text-anchor="middle" dominant-baseline="central">12</text></g>
  <text class="ts" x="244" y="96" text-anchor="middle">3</text>
  <g class="c-gray"><rect x="220" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="244" y="129" text-anchor="middle" dominant-baseline="central">19</text></g>
  <text class="ts" x="292" y="96" text-anchor="middle">4</text>
  <g class="c-gray"><rect x="268" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="292" y="129" text-anchor="middle" dominant-baseline="central">27</text></g>
  <text class="ts" x="340" y="96" text-anchor="middle">5</text>
  <g class="c-amber"><rect x="316" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="340" y="129" text-anchor="middle" dominant-baseline="central">34</text></g>
  <text class="ts" x="388" y="96" text-anchor="middle">6</text>
  <g class="c-teal"><rect x="364" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="388" y="129" text-anchor="middle" dominant-baseline="central">41</text></g>
  <text class="ts" x="436" y="96" text-anchor="middle">7</text>
  <g class="c-teal"><rect x="412" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="436" y="129" text-anchor="middle" dominant-baseline="central">55</text></g>
  <text class="ts" x="484" y="96" text-anchor="middle">8</text>
  <g class="c-teal"><rect x="460" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="484" y="129" text-anchor="middle" dominant-baseline="central">63</text></g>
  <text class="ts" x="532" y="96" text-anchor="middle">9</text>
  <g class="c-teal"><rect x="508" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="532" y="129" text-anchor="middle" dominant-baseline="central">70</text></g>
  <text class="ts" x="580" y="96" text-anchor="middle">10</text>
  <g class="c-teal"><rect x="556" y="106" width="48" height="46" rx="6" stroke-width="0.5"/><text class="th" x="580" y="129" text-anchor="middle" dominant-baseline="central">88</text></g>
  <line class="leader" x1="100" y1="158" x2="100" y2="176"/>
  <text class="th" x="100" y="192" text-anchor="middle">lo</text>
  <line class="leader" x1="340" y1="158" x2="340" y2="176"/>
  <text class="th" x="340" y="192" text-anchor="middle">mid</text>
  <line class="leader" x1="580" y1="158" x2="580" y2="176"/>
  <text class="th" x="580" y="192" text-anchor="middle">hi</text>
  <text class="ts" x="40" y="224">target 41 &gt; midpoint 34, so indices 0&#8211;5 are eliminated and the search continues in teal</text>

</svg>
