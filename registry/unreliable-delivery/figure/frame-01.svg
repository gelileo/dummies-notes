<svg class="cd-svg" xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 360" role="img" font-family="sans-serif">
  <title>Unreliable delivery — sender ships four messages in order</title>
  <desc>A sender hands four numbered messages, in order, into a network it does not control; the receiver inbox is still empty.</desc>
  <defs>
    <style>text{font-family:-apple-system,"Segoe UI",Roboto,system-ui,"Helvetica Neue",Arial,sans-serif;}
text.t{font-size:14px;font-weight:400;fill:#1c1c1a;}
text.ts{font-size:12px;font-weight:400;fill:#6b6a64;}
text.th{font-size:14px;font-weight:500;fill:#111110;}
rect.box,.box>rect{fill:#F1EFE8;stroke:#D3D1C7;}
.arr{stroke:#6b6a64;stroke-width:1.5;fill:none;stroke-linecap:round;}
.leader{stroke:#9c9a92;stroke-width:0.5;stroke-dasharray:3 3;fill:none;}
.c-purple>rect,.c-purple>circle,.c-purple>ellipse,.c-purple>polygon{fill:#EEEDFE;stroke:#534AB7;}
.c-purple .th,.c-purple .t{fill:#3C3489;} .c-purple .ts{fill:#534AB7;}
.c-teal>rect,.c-teal>circle,.c-teal>ellipse,.c-teal>polygon{fill:#E1F5EE;stroke:#0F6E56;}
.c-teal .th,.c-teal .t{fill:#085041;} .c-teal .ts{fill:#0F6E56;}
.c-coral>rect,.c-coral>circle,.c-coral>ellipse,.c-coral>polygon{fill:#FAECE7;stroke:#993C1D;}
.c-coral .th,.c-coral .t{fill:#712B13;} .c-coral .ts{fill:#993C1D;}
.c-pink>rect,.c-pink>circle,.c-pink>ellipse,.c-pink>polygon{fill:#FBEAF0;stroke:#993556;}
.c-pink .th,.c-pink .t{fill:#72243E;} .c-pink .ts{fill:#993556;}
.c-gray>rect,.c-gray>circle,.c-gray>ellipse,.c-gray>polygon{fill:#F1EFE8;stroke:#5F5E5A;}
.c-gray .th,.c-gray .t{fill:#444441;} .c-gray .ts{fill:#5F5E5A;}
.c-blue>rect,.c-blue>circle,.c-blue>ellipse,.c-blue>polygon{fill:#E6F1FB;stroke:#185FA5;}
.c-blue .th,.c-blue .t{fill:#0C447C;} .c-blue .ts{fill:#185FA5;}
.c-green>rect,.c-green>circle,.c-green>ellipse,.c-green>polygon{fill:#EAF3DE;stroke:#3B6D11;}
.c-green .th,.c-green .t{fill:#27500A;} .c-green .ts{fill:#3B6D11;}
.c-amber>rect,.c-amber>circle,.c-amber>ellipse,.c-amber>polygon{fill:#FAEEDA;stroke:#854F0B;}
.c-amber .th,.c-amber .t{fill:#633806;} .c-amber .ts{fill:#854F0B;}
.c-red>rect,.c-red>circle,.c-red>ellipse,.c-red>polygon{fill:#FCEBEB;stroke:#A32D2D;}
.c-red .th,.c-red .t{fill:#791F1F;} .c-red .ts{fill:#A32D2D;}
@media (prefers-color-scheme:dark){
text.t{fill:#d6d4ca;} text.ts{fill:#b6b4aa;} text.th{fill:#f2f0e9;}
rect.box,.box>rect{fill:#2C2C2A;stroke:#5F5E5A;}
.arr{stroke:#b0aea4;} .leader{stroke:#8a8980;}
.c-purple>rect,.c-purple>circle,.c-purple>ellipse,.c-purple>polygon{fill:#3C3489;stroke:#AFA9EC;}
.c-purple .th,.c-purple .t{fill:#CECBF6;} .c-purple .ts{fill:#AFA9EC;}
.c-teal>rect,.c-teal>circle,.c-teal>ellipse,.c-teal>polygon{fill:#085041;stroke:#5DCAA5;}
.c-teal .th,.c-teal .t{fill:#9FE1CB;} .c-teal .ts{fill:#5DCAA5;}
.c-coral>rect,.c-coral>circle,.c-coral>ellipse,.c-coral>polygon{fill:#712B13;stroke:#F0997B;}
.c-coral .th,.c-coral .t{fill:#F5C4B3;} .c-coral .ts{fill:#F0997B;}
.c-pink>rect,.c-pink>circle,.c-pink>ellipse,.c-pink>polygon{fill:#72243E;stroke:#ED93B1;}
.c-pink .th,.c-pink .t{fill:#F4C0D1;} .c-pink .ts{fill:#ED93B1;}
.c-gray>rect,.c-gray>circle,.c-gray>ellipse,.c-gray>polygon{fill:#444441;stroke:#B4B2A9;}
.c-gray .th,.c-gray .t{fill:#D3D1C7;} .c-gray .ts{fill:#B4B2A9;}
.c-blue>rect,.c-blue>circle,.c-blue>ellipse,.c-blue>polygon{fill:#0C447C;stroke:#85B7EB;}
.c-blue .th,.c-blue .t{fill:#B5D4F4;} .c-blue .ts{fill:#85B7EB;}
.c-green>rect,.c-green>circle,.c-green>ellipse,.c-green>polygon{fill:#27500A;stroke:#97C459;}
.c-green .th,.c-green .t{fill:#C0DD97;} .c-green .ts{fill:#97C459;}
.c-amber>rect,.c-amber>circle,.c-amber>ellipse,.c-amber>polygon{fill:#633806;stroke:#EF9F27;}
.c-amber .th,.c-amber .t{fill:#FAC775;} .c-amber .ts{fill:#EF9F27;}
.c-red>rect,.c-red>circle,.c-red>ellipse,.c-red>polygon{fill:#791F1F;stroke:#F09595;}
.c-red .th,.c-red .t{fill:#F7C1C1;} .c-red .ts{fill:#F09595;}
}
.arrow-head{fill:#6b6a64;}
@media (prefers-color-scheme:dark){.arrow-head{fill:#b0aea4;}}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="arrow-head" d="M0,0 L10,5 L0,10 z"/>
    </marker>
  </defs>

  <!-- column labels -->
  <text x="95" y="40" class="th" text-anchor="middle">sender</text>
  <text x="580" y="40" class="th" text-anchor="middle">receiver</text>

  <!-- network band (the part the sender does not control) -->
  <g class="c-gray">
    <rect x="200" y="62" width="280" height="232" rx="10" stroke-width="0.5"/>
    <text x="214" y="80" class="ts">network</text>
  </g>
  <text x="340" y="318" class="ts" text-anchor="middle">many hops the sender does not control</text>

  <!-- sender: four intact messages, in order -->
  <g class="c-teal">
    <rect x="40" y="90" width="110" height="40" rx="4" stroke-width="0.5"/>
    <text x="95" y="110" class="th" text-anchor="middle" dominant-baseline="central">msg 1</text>
  </g>
  <g class="c-teal">
    <rect x="40" y="145" width="110" height="40" rx="4" stroke-width="0.5"/>
    <text x="95" y="165" class="th" text-anchor="middle" dominant-baseline="central">msg 2</text>
  </g>
  <g class="c-teal">
    <rect x="40" y="200" width="110" height="40" rx="4" stroke-width="0.5"/>
    <text x="95" y="220" class="th" text-anchor="middle" dominant-baseline="central">msg 3</text>
  </g>
  <g class="c-teal">
    <rect x="40" y="255" width="110" height="40" rx="4" stroke-width="0.5"/>
    <text x="95" y="275" class="th" text-anchor="middle" dominant-baseline="central">msg 4</text>
  </g>
  <text x="95" y="312" class="ts" text-anchor="middle">sent in order</text>

  <!-- direction of travel into the network -->
  <path class="arr" d="M158,180 L198,180" marker-end="url(#arrow)"/>

  <!-- receiver: empty inbox slots -->
  <g class="box">
    <rect x="520" y="90" width="120" height="40" rx="4" stroke-width="0.5"/>
    <text x="580" y="110" class="ts" text-anchor="middle" dominant-baseline="central">slot 1 — empty</text>
  </g>
  <g class="box">
    <rect x="520" y="145" width="120" height="40" rx="4" stroke-width="0.5"/>
    <text x="580" y="165" class="ts" text-anchor="middle" dominant-baseline="central">slot 2 — empty</text>
  </g>
  <g class="box">
    <rect x="520" y="200" width="120" height="40" rx="4" stroke-width="0.5"/>
    <text x="580" y="220" class="ts" text-anchor="middle" dominant-baseline="central">slot 3 — empty</text>
  </g>
  <g class="box">
    <rect x="520" y="255" width="120" height="40" rx="4" stroke-width="0.5"/>
    <text x="580" y="275" class="ts" text-anchor="middle" dominant-baseline="central">slot 4 — empty</text>
  </g>
  <text x="580" y="312" class="ts" text-anchor="middle">nothing arrived yet</text>
</svg>
