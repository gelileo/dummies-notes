ight=\"168\" rx=\"4\" stroke-width=\"0.5\"/>\n    <text x=\"45\" y=\"118\" class=\"ts\" text-anchor=\"middle\" dominant-baseline=\"central\">greet</text>\n  </g>\n  <g class=\"c-gray\">\n    <rect x=\"16\" y=\"278\" width=\"58\" height=\"60\" rx=\"4\" stroke-width=\"0.5\"/>\n    <text x=\"45\" y=\"296\" class=\"ts\" text-anchor=\"middle\" dominant-baseline=\"central\">talk</text>\n  </g>\n  <g class=\"c-gray\">\n    <rect x=\"16\" y=\"348\" width=\"58\" height=\"50\" rx=\"4\" stroke-width=\"0.5\"/>\n    <text x=\"45\" y=\"366\" class=\"ts\" text-anchor=\"middle\" dominant-baseline=\"central\">goodbye</text>\n  </g>\n\n  <!-- whole lifecycle recap -->\n  <path class=\"leader\" d=\"M156,140 L524,164\"/>\n  <text x=\"340\" y=\"144\" class=\"t\" text-anchor=\"middle\" dominant-baseline=\"central\">greet \u2014 agree to start</text>\n\n  <path class=\"leader\" d=\"M156,228 L524,252\"/>\n  <text x=\"340\" y=\"232\" class=\"t\" text-anchor=\"middle\" dominant-baseline=\"central\">talk \u2014 send and confirm each packet</text>\n\n  <path class=\"leader\" d=\"M156,316 L524,340\"/>\n  <text x=\"340\" y=\"320\" class=\"t\" text-anchor=\"middle\" dominant-baseline=\"central\">goodbye \u2014 close cleanly</text>\n\n  <g class=\"c-coral\">\n    <rect x=\"240\" y=\"366\" width=\"200\" height=\"34\" rx=\"4\" stroke-width=\"0.5\"/>\n    <text x=\"340\" y=\"383\" class=\"th\" text-anchor=\"middle\" dominant-baseline=\"central\">connection closed cleanly</text>\n  </g>\n\n  <text x=\"340\" y=\"420\" class=\"ts\" text-anchor=\"middle\" dominant-baseline=\"central\">open, talk reliably, close \u2014 the full lifecycle</text>\n</svg>\n"];
const CAPTIONS = ["First they greet: a three-message handshake agrees to start.","Then they talk: every packet is answered with an acknowledgement.","If a packet vanishes, the missing acknowledgement triggers a resend.","Finally they say goodbye: fin and ack on both sides close it cleanly.","The whole arc: open, talk reliably, close."];
let i = 0, timer = null;
const stage = document.getElementById('stage');
const caption = document.getElementById('caption');
const count = document.getElementById('count');
function show(n){
  i = (n + FRAMES.length) % FRAMES.length;
  stage.innerHTML = FRAMES[i];
  caption.textContent = CAPTIONS[i] || '';
  count.textContent = (i+1) + ' / ' + FRAMES.length;
}
document.getElementById('prev').onclick = () => show(i-1);
document.getElementById('next').onclick = () => show(i+1);
document.getElementById('play').onclick = (e) => {
  if (timer){ clearInterval(timer); timer = null; e.target.textContent = 'Auto-play'; }
  else { timer = setInterval(() => show(i+1), 1200); e.target.textContent = 'Pause'; }
};
show(0);
</script>
