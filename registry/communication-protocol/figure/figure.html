const CAPTIONS = ["Before a single message, both machines agree on the same rulebook.","Rule 1: A speaks first, and B already knows a hello is coming.","Rule 2: B answers, which is exactly what A was waiting for.","Rule 3: with greetings done, A sends the actual data.","Rule 4: B confirms it arrived \u2014 the script is finished and both sides know it worked."];
let i = 0, timer = null;
const stage = document.getElementById('stage');
const caption = document.getElementById('caption');
const count = document.getElementById('count');
function show(n){
  i = (n + FRAMES.length) % FRAMES.length;
  stage.innerHTML = FRAMES[i];
  caption.textContent = CAPTIONS[i] || '';
  count.textContent = (i+1) + ' / ' + FRAMES.length;
}
document.getElementById('prev').onclick = () => show(i-1);
document.getElementById('next').onclick = () => show(i+1);
document.getElementById('play').onclick = (e) => {
  if (timer){ clearInterval(timer); timer = null; e.target.textContent = 'Auto-play'; }
  else { timer = setInterval(() => show(i+1), 1200); e.target.textContent = 'Pause'; }
};
show(0);
</script>
